<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行事曆 | MyNTU++</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==========================================================================
         左側佈局：側邊欄 (Sidebar)
         ========================================================================== -->
    <aside class="sidebar">
        
        <!-- 側邊欄：頂部搜尋與摺疊按鈕 -->
        <div class="sidebar-header">
            <div class="search-container">
                <input type="text" placeholder="搜尋">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <button class="fold-btn" title="收合側邊欄">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
            </button>
        </div>

        <!-- 側邊欄：導航清單 -->
        <nav class="sidebar-nav custom-scroll">
            
            <details class="nav-item" open>
                <summary>
                    <svg class="nav-arrow" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                    個人專區
                </summary>
                <ul class="nav-sub-list">
                    <li><a href="#">學生基本資料</a></li>
                    <li><a href="#">密碼修改</a></li>
                </ul>
            </details>

            <details class="nav-item">
                <summary>
                    <svg class="nav-arrow" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                    學習課程
                </summary>
                <ul class="nav-sub-list">
                    <li><a href="#">臺大課程網</a></li>
                    <li><a href="#">選課系統</a></li>
                </ul>
            </details>

            <details class="nav-item">
                <summary>
                    <svg class="nav-arrow" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                    各項申請
                </summary>
                <ul class="nav-sub-list">
                    <li><a href="#">學生請假</a></li>
                    <li><a href="#">場地借用</a></li>
                </ul>
            </details>

            <details class="nav-item">
                <summary>
                    <svg class="nav-arrow" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                    公告消息
                </summary>
                <ul class="nav-sub-list">
                    <li><a href="#">校園佈告欄</a></li>
                </ul>
            </details>
        </nav>

        <!-- 側邊欄：底部日曆小工具 -->
        <div class="sidebar-footer">
            <div class="calendar-month" id="sidebarMonth">MAR 2026</div>
            <div class="calendar-grid" id="sidebarCalendar">
                <!-- 由 JavaScript 填充 -->
            </div>
            <a href="calendar.html" class="calendar-link">行事曆</a>
        </div>
    </aside>

    <!-- ==========================================================================
         右側佈局：主畫面 (Main Content)
         ========================================================================== -->
    <main class="main-wrapper">
        
        <!-- 上方工具列 (Header) -->
        <header class="header">
            <!-- 漢堡選單按鈕 -->
            <button class="hamburger-btn" title="開啟側邊欄">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>

            <!-- Logo -->
            <a href="index.html" class="brand-logo">MyNTU++</a>

            <!-- 頁面標題 -->
            <div class="page-title">
                行事曆 <span>📅</span>
            </div>

            <!-- 右：操作區 -->
            <div class="header-actions">
                
                <!-- 常用連結彈出選單 -->
                <div class="dropdown-wrapper">
                    <button class="action-icon-btn">
                        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"></path></svg>
                    </button>
                    <div class="dropdown-menu menu-pinned">
                        <div class="dropdown-title">由用戶釘選</div>
                        <ul>
                            <li><a href="#">📖 快速選課</a></li>
                            <li><a href="#">✉️ 收發信件</a></li>
                        </ul>
                    </div>
                </div>

                <!-- 設定彈出選單 -->
                <div class="dropdown-wrapper">
                    <button class="action-icon-btn settings-btn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                    <div class="dropdown-menu menu-settings">
                        <a href="#">EN / 中</a>
                        <a href="#" class="theme-btn">☀️ / 🌙 主題</a>
                        <div class="divider"></div>
                        <a href="about.html" style="color: var(--text-muted);">關於我們</a>
                        <a href="https://github.com/gc-octopis/114-2_WebAPP_Team06" style="color: var(--text-muted);">GitHub</a>
                    </div>
                </div>

                <!-- 登入按鈕 -->
                <a href="#" class="sign-in-btn">登入</a>
            </div>
        </header>

        <!-- 主內容捲動區 -->
        <div class="content-scroll-area custom-scroll">
            <div class="content-container calendar-content">
                
                <!-- 行事曆控制區 -->
                <section class="calendar-controls">
                    <button id="prevMonth" class="calendar-nav-btn">← 前月</button>
                    <h1 id="currentMonth" class="calendar-title">2026年 3月</h1>
                    <button id="nextMonth" class="calendar-nav-btn">後月 →</button>
                </section>

                <!-- 行事曆網格 -->
                <section class="calendar-month-view">
                    <div class="calendar-weekdays">
                        <div class="weekday">日</div>
                        <div class="weekday">一</div>
                        <div class="weekday">二</div>
                        <div class="weekday">三</div>
                        <div class="weekday">四</div>
                        <div class="weekday">五</div>
                        <div class="weekday">六</div>
                    </div>
                    <div class="calendar-days" id="calendarDays">
                        <!-- 由 JavaScript 填充 -->
                    </div>
                </section>

                <!-- 事件列表 -->
                <section class="events-section">
                    <h2 class="section-title">活動清單</h2>
                    <div class="events-list" id="eventsList">
                        <p class="no-events">選擇日期查看活動</p>
                    </div>
                </section>

            </div>
        </div>
    </main>

    <script src="rwd.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
